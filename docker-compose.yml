services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pdf-editor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/storage:/app/backend/app/storage

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdf-editor-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
